services:
  postgres:
    image: postgres:16
    container_name: datosenorden-postgres
    environment:
      POSTGRES_DB: datosenorden
      POSTGRES_USER: datosenorden
      POSTGRES_PASSWORD: datosenorden
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datosenorden -d datosenorden"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
